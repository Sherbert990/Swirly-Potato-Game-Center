<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Don't Look Down</title>
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#7d2ae8">
<link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { background: #160d29; font-family: sans-serif; }
#wrapper { position: relative; width: 100vw; height: 100vh; }
canvas { display: block; width: 100%; height: 100%; background: #1a0b2e; }
#ui { position: absolute; top: 0; left: 0; width: 100%; pointer-events: none; }
#scoreDisplay { position: absolute; top: 14px; left: 50%; transform: translateX(-50%); background: rgba(13,2,33,0.6); color: #2de2e6; padding: 6px 22px; border-radius: 20px; font-size: 18px; font-weight: 600; letter-spacing: 0.5px; }
#gameButtons { position: absolute; top: 12px; right: 12px; display: none; gap: 8px; pointer-events: auto; }
.gameBtn { background: rgba(13,2,33,0.6); color: #c9a9ff; border: 1px solid rgba(155,93,229,0.5); border-radius: 14px; padding: 7px 14px; font-size: 14px; font-weight: 600; cursor: pointer; }
.gameBtn:hover { background: rgba(125,42,232,0.5); color: #fff; }
#startScreen, #gameOverScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(13,2,33,0.9); color: #fff; z-index: 10; }
#startScreen h1, #gameOverScreen h1 { font-size: 44px; font-weight: 700; margin-bottom: 12px; color: #ff2e97; text-shadow: 0 0 18px rgba(255,46,151,0.6); }
#startScreen p, #gameOverScreen p { font-size: 18px; color: #c9a9ff; margin-bottom: 10px; }
.gBtn { background: #ff2e97; color: #fff; border: none; border-radius: 10px; padding: 14px 40px; font-size: 19px; cursor: pointer; margin-top: 18px; box-shadow: 0 0 20px rgba(255,46,151,0.5); }
.gBtn:hover { background: #c724b1; }
#touchUI { position: absolute; inset: 0; pointer-events: none; z-index: 5; display: none; }
#joyBase { position: absolute; left: 30px; bottom: 30px; width: 104px; height: 104px; border-radius: 50%; border: 2px solid rgba(45,226,230,0.6); background: rgba(125,42,232,0.22); opacity: 0.45; }
#joyBase.active { opacity: 0.92; transform: translate(-50%,-50%); }
#joyKnob { position: absolute; left: 50%; top: 50%; width: 48px; height: 48px; margin: -24px 0 0 -24px; border-radius: 50%; background: rgba(45,226,230,0.88); border: 2px solid #0d0221; }
#jumpPad { position: absolute; right: 28px; bottom: 28px; width: 96px; height: 96px; border-radius: 50%; pointer-events: auto; border: 2px solid rgba(45,226,230,0.5); background: rgba(255,46,151,0.55); color: #fff; font-size: 16px; font-weight: 600; line-height: 1.15; cursor: pointer; user-select: none; }
#jumpPad:active { background: rgba(255,46,151,0.82); }
.histTitle { font-size: 16px; color: #c9a9ff; margin: 18px 0 6px; font-weight: 600; letter-spacing: 0.5px; }
#scoreHistory, #lbList { width: 340px; max-width: 86vw; max-height: 34vh; overflow-y: auto; }
.histRow { display: flex; align-items: center; gap: 10px; padding: 7px 14px; margin: 5px 0; border-radius: 8px; background: rgba(125,42,232,0.18); color: #e8d9ff; font-size: 15px; }
.histRow.current { background: rgba(255,46,151,0.28); color: #fff; box-shadow: 0 0 12px rgba(255,46,151,0.45); }
.histRow .rank { color: #9b5de5; font-weight: 700; width: 30px; }
.histRow .ht { font-weight: 600; flex: 1; }
.histRow .st { color: #ffe14d; }
.histRow .date { color: #8a7aa8; font-size: 12px; width: 44px; text-align: right; }
.histEmpty { color: #8a7aa8; font-size: 14px; }
.pickTitle { font-size: 16px; color: #c9a9ff; margin: 14px 0 4px; font-weight: 600; letter-spacing: 0.5px; }
#avatarPicker { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 92vw; margin-bottom: 4px; }
.avBtn { background: rgba(125,42,232,0.18); border: 2px solid transparent; border-radius: 12px; padding: 3px; cursor: pointer; line-height: 0; }
.avBtn:hover { background: rgba(125,42,232,0.32); }
.avBtn.sel { border-color: #ff2e97; background: rgba(255,46,151,0.15); box-shadow: 0 0 12px rgba(255,46,151,0.5); }
.avBtn canvas { display: block; }
#authScreen, #profileScreen, #leaderboardScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(13,2,33,0.95); color: #fff; z-index: 12; overflow-y: auto; }
#authScreen h1, #profileScreen h1, #leaderboardScreen h1 { font-size: 38px; font-weight: 700; margin-bottom: 6px; color: #ff2e97; text-shadow: 0 0 18px rgba(255,46,151,0.6); }
#authScreen p, #profileScreen p { font-size: 16px; color: #c9a9ff; margin-bottom: 14px; }
.field { width: 280px; max-width: 86vw; margin: 6px 0; }
.field input { width: 100%; padding: 12px 14px; font-size: 16px; border-radius: 10px; border: 1px solid rgba(155,93,229,0.5); background: rgba(125,42,232,0.15); color: #fff; outline: none; }
.field input:focus { border-color: #2de2e6; }
.authErr { color: #ff6b6b; font-size: 14px; min-height: 18px; margin: 4px 0; text-align: center; }
.linkBtn { background: none; border: none; color: #2de2e6; cursor: pointer; font-size: 14px; margin-top: 14px; text-decoration: underline; }
.gBtn.secondary { background: rgba(125,42,232,0.35); box-shadow: none; padding: 11px 26px; font-size: 16px; }
.gBtn.secondary:hover { background: rgba(125,42,232,0.55); }
#startUser { font-size: 20px; color: #2de2e6; font-weight: 600; margin-bottom: 4px; }
.topBtns { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; justify-content: center; }
.lbTabs { display: flex; gap: 8px; margin: 14px 0 8px; }
.lbTab { background: rgba(125,42,232,0.18); color: #c9a9ff; border: 1px solid rgba(155,93,229,0.4); border-radius: 16px; padding: 7px 18px; font-size: 14px; font-weight: 600; cursor: pointer; }
.lbTab.sel { background: #ff2e97; color: #fff; border-color: #ff2e97; }
.histRow .nm { flex: 1; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.histRow .nm.anon { color: #8a7aa8; font-style: italic; }
.histRow .gh { color: #2de2e6; font-weight: 700; width: 56px; text-align: right; }
.toggleRow { display: flex; align-items: center; gap: 10px; margin: 14px 0 2px; color: #c9a9ff; font-size: 14px; max-width: 280px; cursor: pointer; }
.toggleRow input { width: 18px; height: 18px; accent-color: #ff2e97; cursor: pointer; flex-shrink: 0; }
.toggleRow.off { opacity: 0.4; cursor: not-allowed; }
.toggleRow.off input { cursor: not-allowed; }
#storeScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(13,2,33,0.96); color: #fff; z-index: 12; overflow-y: auto; padding: 20px 0; }
#storeScreen h1 { font-size: 38px; font-weight: 700; margin-bottom: 4px; color: #ffe14d; text-shadow: 0 0 18px rgba(255,225,77,0.5); }
.balance { font-size: 20px; color: #ffe14d; font-weight: 700; margin: 4px 0 8px; }
.storeSection { font-size: 15px; color: #c9a9ff; font-weight: 600; letter-spacing: 0.5px; margin: 12px 0 4px; }
#storeItems, #storeAvatars { width: 360px; max-width: 90vw; }
.storeRow { display: flex; align-items: center; gap: 12px; padding: 10px 14px; margin: 6px 0; border-radius: 10px; background: rgba(125,42,232,0.18); }
.storeRow .info { flex: 1; min-width: 0; }
.storeRow .nm2 { font-weight: 700; color: #fff; font-size: 15px; }
.storeRow .ds { color: #c9a9ff; font-size: 12px; }
.storeRow .own { color: #2de2e6; font-size: 12px; font-weight: 600; }
.buyBtn { background: #ff2e97; color: #fff; border: none; border-radius: 8px; padding: 8px 14px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; box-shadow: 0 0 12px rgba(255,46,151,0.4); }
.buyBtn:hover { background: #c724b1; }
.buyBtn:disabled { background: rgba(125,42,232,0.3); color: #8a7aa8; cursor: not-allowed; box-shadow: none; }
.buyBtn.owned { background: rgba(45,226,230,0.25); color: #2de2e6; cursor: default; box-shadow: none; }
#storeAvatars { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
.avCard { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px; border-radius: 12px; background: rgba(125,42,232,0.18); width: 104px; }
.avCard .nm2 { font-size: 13px; font-weight: 700; }
.avCard canvas { display: block; }
#reviveBtn { background: #2de2e6; color: #0d0221; box-shadow: 0 0 20px rgba(45,226,230,0.6); }
#reviveBtn:hover { background: #25c3c6; }
</style>
</head>
<body>
<div id="wrapper">
  <canvas id="gameCanvas" width="680" height="420"></canvas>
  <div id="ui"><div id="scoreDisplay">Height: 0m</div></div>
  <div id="gameButtons">
    <button class="gameBtn" id="gameProfileBtn">Profile</button>
    <button class="gameBtn" id="gameLogoutBtn">Log out</button>
  </div>
  <div id="authScreen" style="display:none">
    <h1>Don't Look Down</h1>
    <p id="authSubtitle">Sign in to start climbing</p>
    <div class="field"><input id="authUser" type="text" placeholder="Username" autocomplete="username" maxlength="20"></div>
    <div class="field"><input id="authPass" type="password" placeholder="Password" autocomplete="current-password"></div>
    <div id="authPickerWrap" style="display:none">
      <div class="pickTitle">Choose your climber</div>
      <div id="signupPicker"></div>
    </div>
    <div class="authErr" id="authErr"></div>
    <button class="gBtn" id="authSubmit">Sign In</button>
    <button class="linkBtn" id="authToggle">New here? Create an account</button>
  </div>
  <div id="profileScreen" style="display:none">
    <h1>Profile</h1>
    <p>Change your username or climber</p>
    <div class="field"><input id="profileUser" type="text" placeholder="Username" maxlength="20"></div>
    <div class="pickTitle">Your climber</div>
    <div id="profilePicker"></div>
    <label class="toggleRow"><input type="checkbox" id="profileShowName"><span>Show my username on the global leaderboard</span></label>
    <div class="authErr" id="profileErr"></div>
    <div class="topBtns">
      <button class="gBtn secondary" id="profileCancel">Back</button>
      <button class="gBtn" id="profileSave">Save</button>
    </div>
  </div>
  <div id="startScreen" style="display:none">
    <h1>Don't Look Down</h1>
    <div id="startUser">Climbing as —</div>
    <div class="balance" id="startBalance">★ 0 stars</div>
    <p style="font-size:15px;color:#7d2ae8">Arrow keys / WASD to move &amp; jump</p>
    <label class="toggleRow" id="hsRow"><input type="checkbox" id="useHeadStart"><span>Use Head Start (+50m) — <b id="hsCount">0</b> owned</span></label>
    <label class="toggleRow" id="rkRow"><input type="checkbox" id="useRocket"><span>Use Rocket Booster (+100m) — <b id="rkCount">0</b> owned</span></label>
    <label class="toggleRow" id="dbRow"><input type="checkbox" id="useDoubler"><span>Use Star Doubler (2× stars) — <b id="dbCount">0</b> owned</span></label>
    <button class="gBtn" id="startBtn">Play</button>
    <div class="topBtns">
      <button class="gBtn secondary" id="storeBtn">Store</button>
      <button class="gBtn secondary" id="leaderboardBtn">Leaderboards</button>
      <button class="gBtn secondary" id="profileBtn">Profile</button>
      <button class="gBtn secondary" id="logoutBtn">Log out</button>
    </div>
  </div>
  <div id="storeScreen" style="display:none">
    <h1>Store</h1>
    <div class="balance" id="storeBalance">★ 0 stars</div>
    <div id="storePowerSection">
      <div class="storeSection">Power-ups</div>
      <div id="storeItems"></div>
    </div>
    <div id="storeSkinSection" style="display:none">
      <div class="storeSection">Premium climbers</div>
      <div id="storeAvatars"></div>
    </div>
    <div class="authErr" id="storeErr"></div>
    <div class="lbTabs" id="storeSeg">
      <button class="lbTab sel" type="button" data-section="power">Power-ups</button>
      <button class="lbTab" type="button" data-section="skins">Skins</button>
    </div>
    <button class="gBtn secondary" id="storeBack">Back</button>
  </div>
  <div id="leaderboardScreen" style="display:none">
    <h1>Leaderboard</h1>
    <div class="lbTabs" id="lbTabs">
      <button class="lbTab sel" data-tab="personal">My Climbs</button>
      <button class="lbTab" data-tab="global">Global</button>
    </div>
    <div id="lbList"></div>
    <button class="gBtn secondary" id="lbBack">Back</button>
  </div>
  <div id="gameOverScreen" style="display:none">
    <h1>You fell!</h1>
    <p id="finalScore">Height: 0m</p>
    <p id="finalCoins">Stars: 0</p>
    <div class="lbTabs" id="goTabs">
      <button class="lbTab sel" data-tab="personal">My Climbs</button>
      <button class="lbTab" data-tab="global">Global</button>
    </div>
    <div id="scoreHistory"></div>
    <div class="topBtns">
      <button class="gBtn" id="reviveBtn" style="display:none">Revive</button>
      <button class="gBtn" id="restartBtn">Play again</button>
    </div>
  </div>
</div>
<div id="touchUI">
  <div id="joyBase"><div id="joyKnob"></div></div>
  <button id="jumpPad">▲<br>Jump</button>
</div>
<script src="/shared/gamecenter.js"></script>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
// W/H = play-area size (W is capped so platforms stay reachable). CANVAS_W = full
// window width so the color background spans the whole screen; OX centers the play
// column inside it.
let W = window.innerWidth, H = window.innerHeight, CANVAS_W = W, OX = 0;
const MAX_PLAY_W = 700;
const GRAVITY = 0.45, JUMP = -10.5, SPEED = 4;
const GAP = 78, ZONE_PX = 1000; // change vibe every 100 m (10 px = 1 m)
const CRUMBLE_FRAMES = 42; // frames a crumbling platform lasts after first touch
const THEMES = [
  { bgTop:'#160d29', bgBottom:'#3b1d52', platforms:['#ff2e97','#c724b1','#7d2ae8','#2de2e6','#ff6ec7','#9b5de5','#f15bb5'] },
  { bgTop:'#2b0a0a', bgBottom:'#5e1a12', platforms:['#ff6b35','#f7c331','#ff3c38','#ffa630','#e8491d','#ffd23f'] },
  { bgTop:'#06231a', bgBottom:'#0d4a32', platforms:['#3ddc84','#1b998b','#a8e063','#56ab2f','#21d19f','#9ee493'] },
  { bgTop:'#07223b', bgBottom:'#0d4a6e', platforms:['#48cae4','#0096c7','#90e0ef','#00b4d8','#caf0f8','#5fa8d3'] },
  { bgTop:'#2d0a1f', bgBottom:'#5e1840', platforms:['#ff5d8f','#ff99c8','#c44b9c','#ffb3c6','#e0457b','#ff7eb6'] },
];
function paletteFor(zone) {
  return THEMES[((zone % THEMES.length) + THEMES.length) % THEMES.length].platforms;
}

const AVATARS = [
  { name:'Aqua',  head:'#2de2e6', body:'#ff2e97', legs:'#9b5de5', shape:'round',  face:'smile', hat:null },
  { name:'Ember', head:'#ffd23f', body:'#ff6b35', legs:'#e8491d', shape:'round',  face:'smile', hat:'cap',        hatColor:'#c1121f' },
  { name:'Leaf',  head:'#d8f3a8', body:'#3ddc84', legs:'#1b998b', shape:'round',  face:'smile', hat:null },
  { name:'Wave',  head:'#90e0ef', body:'#0096c7', legs:'#023e8a', shape:'round',  face:'visor', hat:'headphones', hatColor:'#03045e' },
  { name:'Rose',  head:'#ffd6e7', body:'#ff5d8f', legs:'#c44b9c', shape:'round',  face:'smile', hat:'bow',        hatColor:'#ff85a1' },
  { name:'Bolt',  head:'#fff3b0', body:'#ffca3a', legs:'#ff9e00', shape:'round',  face:'smile', hat:'cap',        hatColor:'#ff5400' },
  { name:'Grape', head:'#c77dff', body:'#7d2ae8', legs:'#5a189a', shape:'square', face:'smile', hat:'crown',      hatColor:'#ffd60a' },
  { name:'Bot',   head:'#cdd6e0', body:'#8d99ae', legs:'#495057', shape:'square', face:'bot',   hat:'antenna' },
  { name:'Mint',  head:'#caffbf', body:'#21d19f', legs:'#168aad', shape:'round',  face:'smile', hat:'antenna' },
  { name:'Volt',  head:'#f72585', body:'#4361ee', legs:'#3a0ca3', shape:'square', face:'eyes',  hat:'headphones', hatColor:'#3a0ca3' },
  // Premium avatars (store-only, indices 10+)
  { name:'Nova',    head:'#fff7ad', body:'#ff8c00', legs:'#ff4d00', shape:'round',  face:'smile', hat:'crown',      hatColor:'#fff700', glow:'#ffb700' },
  { name:'Phantom', head:'#1a1030', body:'#2b0a4a', legs:'#10001f', shape:'square', face:'eyes',  hat:'antenna',                     glow:'#b14dff' },
  { name:'Aurora',  head:'#caffbf', body:'#2de2e6', legs:'#7d2ae8', shape:'round',  face:'smile', hat:'bow',        hatColor:'#ff2e97', glow:'#2de2e6' },
  { name:'Cosmo',   head:'#e0c3fc', body:'#8e2de2', legs:'#4a00e0', shape:'square', face:'visor', hat:'headphones', hatColor:'#00f5d4', glow:'#f72585' },
];
const PREMIUM_START = 10; // avatars at this index and beyond must be bought
const AV_DARK = '#1a1030';
let selectedAvatar = 0;

function drawHat(ctx, cx, cy, a) {
  const c = a.hatColor || a.legs;
  if (a.hat === 'cap') {
    ctx.fillStyle = c;
    ctx.beginPath(); ctx.arc(cx, cy-4, 9, Math.PI, 0); ctx.fill();
    ctx.fillRect(cx-11, cy-5, 22, 2.4);
  } else if (a.hat === 'antenna') {
    ctx.strokeStyle = c; ctx.lineWidth = 2; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(cx, cy-10); ctx.lineTo(cx, cy-16); ctx.stroke();
    ctx.fillStyle = a.body; ctx.beginPath(); ctx.arc(cx, cy-17, 2.6, 0, Math.PI*2); ctx.fill();
  } else if (a.hat === 'bow') {
    ctx.fillStyle = c;
    ctx.beginPath(); ctx.moveTo(cx, cy-10); ctx.lineTo(cx-7, cy-14); ctx.lineTo(cx-7, cy-6); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx, cy-10); ctx.lineTo(cx+7, cy-14); ctx.lineTo(cx+7, cy-6); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.arc(cx, cy-10, 2.2, 0, Math.PI*2); ctx.fill();
  } else if (a.hat === 'crown') {
    ctx.fillStyle = c;
    const cb = cy-8, ct = cy-16;
    ctx.beginPath();
    ctx.moveTo(cx-9, cb); ctx.lineTo(cx-9, ct+3); ctx.lineTo(cx-4.5, cb-2);
    ctx.lineTo(cx, ct); ctx.lineTo(cx+4.5, cb-2); ctx.lineTo(cx+9, ct+3);
    ctx.lineTo(cx+9, cb); ctx.closePath(); ctx.fill();
  } else if (a.hat === 'headphones') {
    ctx.strokeStyle = c; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(cx, cy-1, 11, Math.PI*1.15, Math.PI*1.85); ctx.stroke();
    ctx.fillStyle = c;
    ctx.beginPath(); ctx.roundRect(cx-13, cy-3, 5, 8, 2); ctx.fill();
    ctx.beginPath(); ctx.roundRect(cx+8, cy-3, 5, 8, 2); ctx.fill();
  }
}

function drawAvatar(ctx, x, y, w, h, a) {
  const cx = x + w/2, cy = y + 10;
  if (a.glow) {
    const g = ctx.createRadialGradient(cx, cy+8, 2, cx, cy+8, 26);
    g.addColorStop(0, a.glow); g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.save(); ctx.globalAlpha = 0.55;
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(cx, cy+8, 26, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
  ctx.fillStyle = a.legs;
  ctx.fillRect(x+3, y+30, 10, 8); ctx.fillRect(x+w-13, y+30, 10, 8);
  ctx.fillStyle = a.body;
  ctx.beginPath(); ctx.roundRect(x+3, y+18, w-6, 14, 3); ctx.fill();
  ctx.fillStyle = a.head;
  ctx.beginPath();
  if (a.shape === 'square') ctx.roundRect(cx-10, cy-10, 20, 20, 5);
  else ctx.arc(cx, cy, 10, 0, Math.PI*2);
  ctx.fill();

  drawHat(ctx, cx, cy, a);

  const eyes = (oy) => { ctx.fillStyle = AV_DARK;
    ctx.beginPath(); ctx.arc(cx-3.5, cy+oy, 1.8, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+3.5, cy+oy, 1.8, 0, Math.PI*2); ctx.fill(); };
  const smile = (oy) => { ctx.strokeStyle = AV_DARK; ctx.lineWidth = 1.6; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.arc(cx, cy+oy, 3.6, 0.18*Math.PI, 0.82*Math.PI); ctx.stroke(); };

  if (a.face === 'smile') { eyes(-1); smile(2); }
  else if (a.face === 'eyes') { eyes(0); }
  else if (a.face === 'visor') {
    ctx.fillStyle = 'rgba(20,12,40,0.85)';
    ctx.beginPath(); ctx.roundRect(cx-8, cy-3, 16, 6, 3); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.55)'; ctx.fillRect(cx-6, cy-2, 4, 2);
  } else if (a.face === 'bot') {
    ctx.fillStyle = 'rgba(20,12,40,0.85)';
    ctx.beginPath(); ctx.roundRect(cx-8, cy-4, 16, 6, 3); ctx.fill();
    ctx.fillStyle = '#2de2e6'; ctx.fillRect(cx-5, cy-2.5, 2.5, 2.5); ctx.fillRect(cx+2.5, cy-2.5, 2.5, 2.5);
    ctx.fillStyle = AV_DARK; ctx.fillRect(cx-5, cy+4, 10, 2.5);
    ctx.fillStyle = a.head; ctx.fillRect(cx-2.5, cy+4, 1.4, 2.5); ctx.fillRect(cx+1.1, cy+4, 1.4, 2.5);
  }
}
let game, keys = {}, touchLeft = false, touchRight = false, touchJump = false;

function esc(s) { return String(s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }

function renderPersonal(el, scores, currentId) {
  if (!scores.length) { el.innerHTML = '<div class="histEmpty">No climbs yet — this is your first!</div>'; return; }
  el.innerHTML = scores.map((s, i) => {
    const d = new Date(s.date);
    const date = (d.getMonth() + 1) + '/' + d.getDate();
    const cls = s.id === currentId ? 'histRow current' : 'histRow';
    return `<div class="${cls}"><span class="rank">#${i+1}</span><span class="ht">${s.height}m</span><span class="st">★ ${s.stars}</span><span class="date">${date}</span></div>`;
  }).join('');
}

function renderGlobal(el, entries) {
  if (!entries.length) { el.innerHTML = '<div class="histEmpty">No scores yet — be the first to climb!</div>'; return; }
  el.innerHTML = entries.map((e, i) => {
    const cls = e.isMe ? 'histRow current' : 'histRow';
    const nm = e.name === 'Anonymous' ? '<span class="nm anon">Anonymous</span>' : `<span class="nm">${esc(e.name)}</span>`;
    return `<div class="${cls}"><span class="rank">#${i+1}</span>${nm}<span class="st">★ ${e.stars}</span><span class="gh">${e.height}m</span></div>`;
  }).join('');
}

// Tabbed board: tabsEl holds .lbTab[data-tab] buttons, listEl is the list.
// personalData (optional) is {scores, currentId} from the just-finished run.
async function showBoard(tabsEl, listEl, tab, personalData) {
  tabsEl.querySelectorAll('.lbTab').forEach(b => b.classList.toggle('sel', b.dataset.tab === tab));
  listEl.innerHTML = '<div class="histEmpty">Loading…</div>';
  if (tab === 'personal') {
    if (personalData) { renderPersonal(listEl, personalData.scores, personalData.currentId); return; }
    const r = await api('/api/leaderboard/personal');
    renderPersonal(listEl, (r.data && r.data.scores) || [], null);
  } else {
    const r = await api('/api/leaderboard/global');
    renderGlobal(listEl, (r.data && r.data.entries) || []);
  }
}
function wireTabs(tabsEl, listEl, getPersonalData) {
  tabsEl.querySelectorAll('.lbTab').forEach(b => {
    b.onclick = () => showBoard(tabsEl, listEl, b.dataset.tab, b.dataset.tab === 'personal' ? getPersonalData() : null);
  });
}

function resize() {
  // Fall back through every size source so W/H are never 0 — some hosts
  // (embedded views, pre-layout loads) report a 0-size viewport, which would
  // spawn the player off-screen at the far-left edge and break platform layout.
  CANVAS_W = window.innerWidth || document.documentElement.clientWidth || canvas.clientWidth || 680;
  H = window.innerHeight || document.documentElement.clientHeight || canvas.clientHeight || 420;
  // Canvas fills the whole screen (so the color background spans edge-to-edge),
  // but the play column is capped and centered so platforms stay reachable.
  W = Math.min(CANVAS_W, MAX_PLAY_W);
  OX = Math.round((CANVAS_W - W) / 2);
  canvas.width = CANVAS_W;
  canvas.height = H;
  // If a run hasn't started moving yet, re-center the idle player on the
  // starting platform so a late-arriving real viewport size still plays right.
  if (game && game.player && game.maxHeight <= game.heightBonus) {
    game.player.x = W/2 - game.player.w/2;
  }
}
window.addEventListener('resize', resize);
resize();

function addPlatform() {
  const i = game.count;
  let x, w, y;
  if (i === 0) { w = 160; x = W/2 - 80; y = H - 60; }
  else { w = 60 + Math.random() * 90; x = Math.random() * (W - w); y = game.topY - GAP; }
  const zone = Math.max(0, Math.floor((game.originY - y) / ZONE_PX));
  const pal = paletteFor(zone);
  const pl = { x, y, w, h: 12, color: pal[i % pal.length] };
  if (i >= 5) {
    const r = Math.random();
    if (r < 0.20) pl.vx = (0.7 + Math.random() * 1.1) * (Math.random() < 0.5 ? -1 : 1);
    else if (r < 0.38) { pl.crumble = true; pl.timer = 0; }
  }
  game.platforms.push(pl);
  if (i >= 3 && i % 2 === 1 && !pl.vx && !pl.crumble && Math.random() < 0.3) {
    game.coins.push({ x: pl.x + pl.w/2 - 8, y: pl.y - 28, collected: false });
  }
  game.count = i + 1;
  game.topY = y;
}

function ensurePlatforms() {
  while (game.topY - game.cameraY > -H * 1.3) addPlatform();
}

function initGame(opts = {}) {
  const heightBonus = (opts.headStart ? 50 : 0) + (opts.rocket ? 100 : 0);
  game = {
    player: { x: W/2-14, y: H-96, w: 28, h: 36, vx: 0, vy: 0, onGround: false, jumpsLeft: 2 },
    platforms: [], coins: [], cameraY: 0, maxHeight: heightBonus, score: heightBonus, coinCount: 0, alive: true,
    count: 0, topY: 0, originY: H * 0.4,
    heightBonus, starMult: opts.doubler ? 2 : 1, savedStars: 0
  };
  ensurePlatforms();
}

function update() {
  if (!game || !game.alive) return;
  const p = game.player;
  const left = keys['ArrowLeft']||keys['a']||keys['A']||touchLeft;
  const right = keys['ArrowRight']||keys['d']||keys['D']||touchRight;
  const jump = keys['ArrowUp']||keys['w']||keys['W']||keys[' ']||touchJump;

  if (left) p.vx = -SPEED;
  else if (right) p.vx = SPEED;
  else p.vx *= 0.8;

  if (jump && p.jumpsLeft > 0 && !game.prevJump) { p.vy = JUMP; if (!p.onGround) p.jumpsLeft--; p.onGround = false; }
  game.prevJump = jump;

  p.vy += GRAVITY;
  p.x += p.vx;
  p.y += p.vy;

  if (p.x < 0) p.x = 0;
  if (p.x + p.w > W) p.x = W - p.w;

  for (const pl of game.platforms) {
    if (pl.vx) {
      pl.x += pl.vx;
      if (pl.x < 0) { pl.x = 0; pl.vx *= -1; }
      else if (pl.x + pl.w > W) { pl.x = W - pl.w; pl.vx *= -1; }
    }
    if (pl.triggered && !pl.gone && ++pl.timer > CRUMBLE_FRAMES) pl.gone = true;
    if (pl.gone) { pl.fallY = (pl.fallY || 0) + 0.6; pl.y += pl.fallY; }
  }

  p.onGround = false;
  for (const pl of game.platforms) {
    if (pl.gone) continue;
    const py = pl.y - game.cameraY;
    if (p.vy > 0 && p.x+p.w > pl.x && p.x < pl.x+pl.w && p.y+p.h > py && p.y+p.h < py+pl.h+14) {
      p.y = py - p.h; p.vy = 0; p.onGround = true; p.jumpsLeft = 2;
      if (pl.vx) { p.x += pl.vx; if (p.x < 0) p.x = 0; if (p.x + p.w > W) p.x = W - p.w; }
      if (pl.crumble) pl.triggered = true;
    }
  }

  if (p.y < H * 0.4) {
    const diff = H * 0.4 - p.y;
    game.cameraY -= diff; p.y += diff;
    const h = Math.round(-game.cameraY / 10) + game.heightBonus;
    if (h > game.maxHeight) game.maxHeight = h;
    game.score = game.maxHeight;
    ensurePlatforms();
    game.platforms = game.platforms.filter(pl => pl.y - game.cameraY < H + 300);
    game.coins = game.coins.filter(c => !c.collected && c.y - game.cameraY < H + 300);
  }

  for (const c of game.coins) {
    if (c.collected) continue;
    const cy = c.y - game.cameraY;
    if (p.x < c.x+16 && p.x+p.w > c.x && p.y < cy+16 && p.y+p.h > cy) {
      c.collected = true; game.coinCount += game.starMult;
    }
  }

  document.getElementById('scoreDisplay').textContent = `Height: ${game.maxHeight}m  ★ ${game.coinCount}`;

  if (p.y > H + 60) {
    game.alive = false;
    endRun(game.maxHeight, game.coinCount);
  }
}

function revivePlayer() {
  const p = game.player;
  let best = null, bestPy = Infinity;
  for (const pl of game.platforms) {
    if (pl.gone || pl.crumble) continue;
    const py = pl.y - game.cameraY;
    if (py > H * 0.2 && py < H * 0.85 && py < bestPy) { best = pl; bestPy = py; }
  }
  if (!best) {
    best = { x: W/2 - 60, y: game.cameraY + H * 0.6, w: 120, h: 12, color: '#2de2e6' };
    game.platforms.push(best);
  }
  p.x = best.x + best.w/2 - p.w/2;
  p.y = (best.y - game.cameraY) - p.h;
  p.vx = 0; p.vy = 0; p.jumpsLeft = 2; p.onGround = true;
  game.alive = true;
}

let lastRun = { scores: [], currentId: null };
async function endRun(height, stars) {
  document.getElementById('finalScore').textContent = `Height: ${height}m`;
  document.getElementById('finalCoins').textContent = `Stars collected: ${stars}`;
  document.getElementById('gameButtons').style.display = 'none';
  document.getElementById('gameOverScreen').style.display = 'flex';
  const goTabs = document.getElementById('goTabs');
  const list = document.getElementById('scoreHistory');
  list.innerHTML = '<div class="histEmpty">Saving…</div>';
  const newStars = Math.max(0, stars - (game.savedStars || 0));
  const r = await api('/api/score', { height, stars: newStars });
  game.savedStars = stars;
  lastRun = r.ok ? r.data : { scores: [], currentId: null };
  if (r.ok && r.data.wallet) currentUser = r.data.wallet;
  updateReviveBtn();
  showBoard(goTabs, list, 'personal', lastRun);
}

function updateReviveBtn() {
  const btn = document.getElementById('reviveBtn');
  const n = (currentUser && currentUser.revives) || 0;
  btn.style.display = n > 0 ? 'inline-block' : 'none';
  btn.textContent = `Revive (${n} left)`;
}

function lerpColor(a, b, t) {
  const ah = parseInt(a.slice(1), 16), bh = parseInt(b.slice(1), 16);
  const ar = ah>>16, ag = (ah>>8)&255, ab = ah&255;
  const br = bh>>16, bg = (bh>>8)&255, bb = bh&255;
  return `rgb(${Math.round(ar+(br-ar)*t)},${Math.round(ag+(bg-ag)*t)},${Math.round(ab+(bb-ab)*t)})`;
}

function zoneBg() {
  const zf = Math.max(0, (-game.cameraY) / ZONE_PX);
  const base = Math.floor(zf), frac = zf - base;
  const tt = frac > 0.8 ? (frac - 0.8) / 0.2 : 0;
  const a = THEMES[base % THEMES.length], b = THEMES[(base+1) % THEMES.length];
  return { top: lerpColor(a.bgTop, b.bgTop, tt), bottom: lerpColor(a.bgBottom, b.bgBottom, tt) };
}

function draw() {
  // Background + stars fill the whole canvas (full screen width).
  ctx.clearRect(0, 0, CANVAS_W, H);
  const bg = zoneBg();
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, bg.top); grad.addColorStop(1, bg.bottom);
  ctx.fillStyle = grad; ctx.fillRect(0, 0, CANVAS_W, H);

  for (let i = 0; i < 110; i++) {
    const sx = (i * 137 + 23) % CANVAS_W;
    const sy = ((i * 97 + 11 + Math.floor(game.cameraY * 0.05)) % H + H) % H;
    ctx.fillStyle = `rgba(255,255,255,${0.15 + (i%4)*0.12})`;
    ctx.fillRect(sx, sy, i%5===0?2:1, i%5===0?2:1);
  }

  // Gameplay (platforms, coins, player) is drawn inside the centered play column.
  ctx.save();
  ctx.translate(OX, 0);

  for (const pl of game.platforms) {
    const py = pl.y - game.cameraY;
    if (py < -20 || py > H+20) continue;
    let drawX = pl.x, alpha = 1;
    if (pl.crumble) {
      if (pl.gone) alpha = Math.max(0, 1 - (pl.fallY || 0) / 9);
      else if (pl.triggered) { drawX += Math.sin(pl.timer * 0.9) * 2; alpha = 1 - (pl.timer / CRUMBLE_FRAMES) * 0.45; }
    }
    ctx.globalAlpha = alpha;
    ctx.fillStyle = pl.color;
    ctx.beginPath(); ctx.roundRect(drawX, py, pl.w, pl.h, 4); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.22)';
    ctx.fillRect(drawX+4, py+2, pl.w-8, 3);
    if (pl.crumble) {
      ctx.strokeStyle = 'rgba(0,0,0,0.45)'; ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(drawX+pl.w*0.35, py); ctx.lineTo(drawX+pl.w*0.3, py+pl.h);
      ctx.moveTo(drawX+pl.w*0.62, py); ctx.lineTo(drawX+pl.w*0.7, py+pl.h);
      ctx.stroke();
    }
    if (pl.vx) {
      const mid = drawX + pl.w/2, ay = py + pl.h/2, d = pl.vx > 0 ? 1 : -1;
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      ctx.beginPath();
      ctx.moveTo(mid + d*5, ay); ctx.lineTo(mid - d*3, ay-3.5); ctx.lineTo(mid - d*3, ay+3.5);
      ctx.closePath(); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  for (const c of game.coins) {
    if (c.collected) continue;
    const cy = c.y - game.cameraY;
    if (cy < -20 || cy > H+20) continue;
    ctx.fillStyle = '#ffe14d';
    ctx.beginPath(); ctx.arc(c.x+8, cy+8, 7, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#8a2d6b'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('★', c.x+8, cy+12);
  }

  const p = game.player;
  if (p.jumpsLeft === 1 && !p.onGround) {
    ctx.fillStyle = 'rgba(45,226,230,0.5)'; ctx.beginPath(); ctx.arc(p.x+p.w/2, p.y+p.h/2, 18, 0, Math.PI*2); ctx.fill();
  }
  drawAvatar(ctx, p.x, p.y, p.w, p.h, AVATARS[selectedAvatar]);

  if (currentUser) {
    const name = currentUser.username;
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    const tw = ctx.measureText(name).width;
    const lx = p.x + p.w / 2, ly = p.y - 14;
    ctx.fillStyle = 'rgba(13,2,33,0.6)';
    ctx.beginPath(); ctx.roundRect(lx - tw/2 - 6, ly - 11, tw + 12, 16, 8); ctx.fill();
    ctx.fillStyle = '#2de2e6';
    ctx.fillText(name, lx, ly + 1);
  }

  ctx.restore();
}

function loop() {
  if (game && game.alive) { update(); draw(); }
  requestAnimationFrame(loop);
}

// Builds avatar thumbnails into a container. `getSel` returns the current index,
// `onPick` is called with the chosen index.
function buildPicker(container, getSel, onPick, indices) {
  indices = indices || AVATARS.map((_, i) => i);
  container.innerHTML = '';
  indices.forEach(i => {
    const a = AVATARS[i];
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.dataset.idx = i;
    btn.className = 'avBtn' + (i === getSel() ? ' sel' : '');
    btn.title = a.name;
    const cv = document.createElement('canvas');
    cv.width = 46; cv.height = 66;
    const c = cv.getContext('2d');
    c.save(); c.translate(3.5, 11); c.scale(1.4, 1.4);
    drawAvatar(c, 0, 0, 28, 36, a);
    c.restore();
    btn.appendChild(cv);
    btn.onclick = () => {
      onPick(i);
      container.querySelectorAll('.avBtn').forEach(b => b.classList.toggle('sel', +b.dataset.idx === i));
    };
    container.appendChild(btn);
  });
}

function baseIndices() { return Array.from({ length: PREMIUM_START }, (_, i) => i); }
function ownedIndices() {
  const owned = (currentUser && currentUser.ownedAvatars) || [];
  const list = [];
  for (let i = 0; i < AVATARS.length; i++) if (i < PREMIUM_START || owned.includes(i)) list.push(i);
  return list;
}

// ── Game Center contract adapter ────────────────────────────────────────────
// The shared backend speaks a normalized contract (game/score/coins, avatar
// KEYS). This game was written against an older shape (height/stars, avatar
// INDICES). Translate at this boundary so the rest of the game is untouched.
const DLD_GAME = 'dont-look-down';
const AVATAR_KEYS = ['dld-aqua','dld-ember','dld-leaf','dld-wave','dld-rose','dld-bolt','dld-grape','dld-bot','dld-mint','dld-volt','dld-nova','dld-phantom','dld-aurora','dld-cosmo'];
const keyToIndex = k => { const i = AVATAR_KEYS.indexOf(k); return i < 0 ? 0 : i; };
const indexToKey = i => AVATAR_KEYS[i] || AVATAR_KEYS[0];

function userFromServer(u) {
  // Normalized user object -> the flat shape this game expects.
  if (!u || (u.coins === undefined && u.avatarKey === undefined)) return u;
  const items = u.items || {};
  return {
    username: u.username,
    avatar: keyToIndex(u.avatarKey),
    ownedAvatars: (u.ownedAvatars || []).filter(k => AVATAR_KEYS.includes(k)).map(keyToIndex),
    stars: u.coins || 0,
    revives: items.revive || 0,
    headStarts: items.headstart || 0,
    rockets: items.rocket_booster || 0,
    doublers: items.doubler || 0,
    showName: u.showName !== false,
  };
}

function reqToServer(path, body) {
  if (!body) return body;
  if (path === '/api/register' || path === '/api/profile') {
    const b = { ...body };
    if (typeof b.avatar === 'number') b.avatar = indexToKey(b.avatar);
    return b;
  }
  if (path === '/api/score') return { game: DLD_GAME, score: body.height, coins: body.stars };
  if (path === '/api/store/buy') {
    if (body.kind === 'avatar') return { kind: 'avatar', key: indexToKey(body.avatar) };
    if (body.kind === 'item') return { kind: 'item', key: body.item };
  }
  return body; // login, logout, use (item keys already match)
}

function lbRows(arr) {
  return (Array.isArray(arr) ? arr : []).map(r => ({ id: r.id, height: r.score, stars: r.coins || 0, date: r.date }));
}

function respFromServer(path, data) {
  if (path.startsWith('/api/leaderboard/personal')) return { scores: lbRows(data) };
  if (path.startsWith('/api/leaderboard/global')) {
    return { entries: (Array.isArray(data) ? data : []).map(r => ({ name: r.username, height: r.score, stars: r.coins || 0, isMe: false })) };
  }
  if (path === '/api/score' && data && data.wallet !== undefined) {
    return { wallet: userFromServer(data.wallet), currentId: data.currentId, scores: lbRows(data.scores) };
  }
  return userFromServer(data);
}

async function api(path, body) {
  // Shares the HTTP/error core with every other game via the Game Center SDK.
  // DLD keeps its local translation (avatar index<->key, height/stars) on top.
  let reqPath = path;
  if (path === '/api/leaderboard/personal' || path === '/api/leaderboard/global') reqPath += '?game=' + DLD_GAME;
  const sent = body ? reqToServer(path, body) : undefined;
  const res = await GameCenter._request(reqPath, body ? 'POST' : 'GET', sent);
  if (!res.ok) return { ok: false, status: res.status, data: { error: res.error || 'Something went wrong' } };
  return { ok: true, status: res.status, data: respFromServer(path, res.data) };
}

// ---- Auth screen ----
let authMode = 'login'; // 'login' | 'signup'
let signupAvatar = 0;

function setAuthMode(mode) {
  authMode = mode;
  const signup = mode === 'signup';
  document.getElementById('authSubtitle').textContent = signup ? 'Create an account to start climbing' : 'Sign in to start climbing';
  document.getElementById('authSubmit').textContent = signup ? 'Create Account' : 'Sign In';
  document.getElementById('authToggle').textContent = signup ? 'Already have an account? Sign in' : 'New here? Create an account';
  document.getElementById('authPickerWrap').style.display = signup ? 'block' : 'none';
  document.getElementById('authPass').autocomplete = signup ? 'new-password' : 'current-password';
  document.getElementById('authErr').textContent = '';
  if (signup) buildPicker(document.getElementById('signupPicker'), () => signupAvatar, i => signupAvatar = i, baseIndices());
}

document.getElementById('authToggle').onclick = () => setAuthMode(authMode === 'login' ? 'signup' : 'login');

document.getElementById('authSubmit').onclick = async () => {
  const username = document.getElementById('authUser').value;
  const password = document.getElementById('authPass').value;
  const err = document.getElementById('authErr');

  const path = authMode === 'signup' ? '/api/register' : '/api/login';

function openProfile() {
  profileAvatar = currentUser.avatar;
  document.getElementById('profileUser').value = currentUser.username;
  document.getElementById('profileShowName').checked = currentUser.showName !== false;
  document.getElementById('profileErr').textContent = '';
  buildPicker(document.getElementById('profilePicker'), () => profileAvatar, i => profileAvatar = i, ownedIndices());
  showScreen('profileScreen');
}
async function doLogout() {
  await api('/api/logout', {});
  currentUser = null;
  document.getElementById('authUser').value = '';
  document.getElementById('authPass').value = '';
  setAuthMode('login');
  showScreen('authScreen');
}

document.getElementById('startBtn').onclick = async () => {

// ---- Store ----
const STORE_ITEMS = [
  { item: 'revive', name: 'Revive', price: 25, desc: 'Get back up after a fall', key: 'revives' },
  { item: 'headstart', name: 'Head Start', price: 15, desc: 'Begin a run +50m up', key: 'headStarts' },
  { item: 'rocket_booster', name: 'Rocket Booster', price: 20, desc: 'Begin a run +100m up', key: 'rockets' },
  { item: 'doubler', name: 'Star Doubler', price: 20, desc: '2× stars for one run', key: 'doublers' },
];
const PREMIUM_PRICES = { 10: 60, 11: 80, 12: 100, 13: 120 };

document.getElementById('storeBtn').onclick = () => GameCenter.openStore('dont-look-down');
document.getElementById('storeBack').onclick = () => enterStartScreen();
// Shared store: when it closes, pull the latest wallet/skin and refresh the start screen.
window.addEventListener('gc:storeclose', async () => {
  const r = await api('/api/me');
  if (r.ok) { currentUser = r.data; selectedAvatar = currentUser.avatar; refreshStartScreen(); }
});

function setStoreSection(section) {
  document.getElementById('storePowerSection').style.display = section === 'power' ? '' : 'none';
  document.getElementById('storeSkinSection').style.display = section === 'skins' ? '' : 'none';
  document.querySelectorAll('#storeSeg .lbTab').forEach(b => b.classList.toggle('sel', b.dataset.section === section));
}
document.querySelectorAll('#storeSeg .lbTab').forEach(b => b.onclick = () => setStoreSection(b.dataset.section));

function openStore() {
  document.getElementById('storeErr').textContent = '';
  renderStore();
  setStoreSection('power');
  showScreen('storeScreen');
}

function renderStore() {
  const u = currentUser || {};
  const stars = u.stars || 0;
  const owned = u.ownedAvatars || [];
  document.getElementById('storeBalance').textContent = `★ ${stars} stars`;

  const itemsEl = document.getElementById('storeItems');
  itemsEl.innerHTML = '';
  STORE_ITEMS.forEach(it => {
    const row = document.createElement('div');
    row.className = 'storeRow';
    const have = u[it.key] || 0;
    row.innerHTML = `<div class="info"><div class="nm2">${it.name}</div><div class="ds">${it.desc}</div>` +
      `<div class="own">Owned: ${have}</div></div>`;
    const btn = document.createElement('button');
    btn.className = 'buyBtn';
    btn.textContent = `★ ${it.price}`;
    btn.disabled = stars < it.price;
    btn.onclick = () => buy({ kind: 'item', item: it.item });
    row.appendChild(btn);
    itemsEl.appendChild(row);
  });

  const avEl = document.getElementById('storeAvatars');
  avEl.innerHTML = '';
  for (let i = PREMIUM_START; i < AVATARS.length; i++) {
    const a = AVATARS[i], price = PREMIUM_PRICES[i];
    const card = document.createElement('div');
    card.className = 'avCard';
    const cv = document.createElement('canvas');
    cv.width = 56; cv.height = 76;
    const c = cv.getContext('2d');
    c.save(); c.translate(8, 14); c.scale(1.6, 1.6);
    drawAvatar(c, 0, 0, 28, 36, a);
    c.restore();
    card.appendChild(cv);
    const nm = document.createElement('div');
    nm.className = 'nm2'; nm.textContent = a.name;
    card.appendChild(nm);
    const btn = document.createElement('button');
    btn.className = 'buyBtn';
    if (owned.includes(i)) {
      btn.classList.add('owned'); btn.textContent = 'Owned'; btn.disabled = true;
    } else {
      btn.textContent = `★ ${price}`;
      btn.disabled = stars < price;
      btn.onclick = () => buy({ kind: 'avatar', avatar: i });
    }
    card.appendChild(btn);
    avEl.appendChild(card);
  }
}

async function buy(payload) {
  const err = document.getElementById('storeErr');
  err.textContent = '';
  const r = await api('/api/store/buy', payload);
  if (!r.ok) { err.textContent = r.data.error || 'Could not buy.'; return; }
  currentUser = r.data;
  renderStore();
}

setAuthMode('login');
(async () => {
  const { ok, data } = await api('/api/me');
  if (ok) { currentUser = data; selectedAvatar = data.avatar; enterStartScreen(); }
  else showScreen('authScreen');
})();
document.addEventListener('keydown', e => { keys[e.key]=true; if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault(); });
document.addEventListener('keyup', e => { keys[e.key]=false; });
// Clear all held inputs when the window loses focus, so an alt-tab mid-press
// can't leave a key/button stuck and shove the player into a wall.
function clearTouch() { touchLeft = touchRight = touchJump = false; if (typeof resetJoy === 'function') resetJoy(); }
function clearInputs() { keys = {}; clearTouch(); }
window.addEventListener('blur', clearInputs);

// ===== Touch controls: floating joystick (left) + jump pad (right) =====
const wrapper = document.getElementById('wrapper');
const touchUI = document.getElementById('touchUI');
const joyBase = document.getElementById('joyBase');
const joyKnob = document.getElementById('joyKnob');
const jumpPad = document.getElementById('jumpPad');

function applyTouchSetting() {
  const on = (window.GameCenter && GameCenter.settings)
    ? GameCenter.settings.touchControls()
    : (matchMedia('(pointer: coarse)').matches || 'ontouchstart' in window);
  touchUI.style.display = on ? 'block' : 'none';
}
applyTouchSetting();
window.addEventListener('gc:settings', applyTouchSetting);

const JOY_R = 46, JOY_DEAD = 10;  // travel radius and standstill deadzone
let joyId = null, joyOX = 0, joyOY = 0;

function joyMove(dx, dy) {
  const dist = Math.hypot(dx, dy) || 1;
  const cl = dist > JOY_R ? JOY_R / dist : 1;
  joyKnob.style.transform = `translate(${dx*cl}px, ${dy*cl}px)`;
  touchLeft = dx < -JOY_DEAD;
  touchRight = dx > JOY_DEAD;
}
function resetJoy() {
  joyId = null; touchLeft = touchRight = false;
  joyBase.classList.remove('active');
  joyBase.style.left = ''; joyBase.style.top = ''; joyBase.style.bottom = '';
  joyKnob.style.transform = '';
}
function endJoy(e) {
  for (const t of e.changedTouches) { if (t.identifier === joyId) resetJoy(); }
}

wrapper.addEventListener('touchstart', e => {
  const r = wrapper.getBoundingClientRect();
  for (const t of e.changedTouches) {
    if (joyId !== null) continue;
    if (t.clientX - r.left > r.width / 2) continue;  // left half drives the stick
    joyId = t.identifier; joyOX = t.clientX; joyOY = t.clientY;
    joyBase.style.left = (t.clientX - r.left) + 'px';
    joyBase.style.top = (t.clientY - r.top) + 'px';
    joyBase.style.bottom = 'auto';
    joyBase.classList.add('active');  // recenters on the finger via translate(-50%,-50%)
    joyMove(0, 0);
    e.preventDefault();
  }
}, {passive:false});
wrapper.addEventListener('touchmove', e => {
  for (const t of e.changedTouches) {
    if (t.identifier !== joyId) continue;
    joyMove(t.clientX - joyOX, t.clientY - joyOY);
    e.preventDefault();
  }
}, {passive:false});
wrapper.addEventListener('touchend', endJoy);
wrapper.addEventListener('touchcancel', endJoy);

// Jump pad: held flag, edge-detected in update() so a tap mid-air double-jumps.
jumpPad.addEventListener('touchstart', e => { e.preventDefault(); e.stopPropagation(); touchJump = true; });
jumpPad.addEventListener('touchend', e => { e.preventDefault(); touchJump = false; });
jumpPad.addEventListener('touchcancel', () => { touchJump = false; });
jumpPad.addEventListener('mousedown', e => { e.preventDefault(); touchJump = true; });
window.addEventListener('mouseup', () => { touchJump = false; });

initGame(); loop();
</script>
