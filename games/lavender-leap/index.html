<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lavender Leap</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="hud" aria-label="Game status">
        <div>
          <p class="eyebrow">Tiny Chaos</p>
          <h1>Lavender Leap</h1>
        </div>
        <div class="stats" aria-live="polite">
          <span><strong id="score">0</strong> points</span>
          <span><strong id="timer">0</strong>m</span>
          <span>Level <strong id="mood">1/100</strong></span>
        </div>
      </section>

      <canvas id="game" width="800" height="520" aria-label="Lavender Leap platformer game area"></canvas>

      <section class="controls" aria-label="Game controls">
        <button id="start" type="button">Start</button>
        <button id="pulse" type="button" title="Dash forward">Dash</button>
        <p>Arrow keys or WASD to run, space to jump, Dash or Shift to zip. Grab crystals and stay on the moving platforms.</p>
      </section>
    </main>

    <script src="game.js?v=11"></script>
  </body>
</html>
