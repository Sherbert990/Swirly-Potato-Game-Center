name: ci

# Run on backend changes AND on the shared manifest / client JS the backend + hub
# depend on, so a bad catalog.json or a JS syntax error can't slip through.
on:
  push:
    paths:
      - "backend/**"
      - "shared/**"
      - "games/**"
      - "scripts/**"
      - "index.html"
      - "sw.js"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - "shared/**"
      - "games/**"
      - "scripts/**"
      - "index.html"
      - "sw.js"
      - ".github/workflows/ci.yml"

jobs:
  # Fast, no database: manifest integrity + client-JS syntax.
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r backend/requirements.txt
      - name: Validate catalog manifest
        run: python scripts/check_catalog.py
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Syntax-check client JS
        run: node scripts/check_js.js

  pytest:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
          MYSQL_DATABASE: gamecenter_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=15
    env:
      TEST_DATABASE_URL: mysql+pymysql://root@127.0.0.1:3306/gamecenter_test?charset=utf8mb4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r backend/requirements.txt
      - name: Wait for MySQL
        run: |
          for i in $(seq 1 30); do
            mysqladmin ping -h 127.0.0.1 -uroot --silent && break
            sleep 2
          done
      - name: Run tests
        run: python -m pytest backend/tests -q
